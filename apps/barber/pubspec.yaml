name: barberhero_barber
description: BarberHero Pro - Barber App
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Shared packages
  api_client:
    path: ../../packages/api_client
  shared_models:
    path: ../../packages/shared_models

  # State management
  provider: ^6.1.0

  # Notifications
  firebase_core: ^3.12.0
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^18.0.0

  # Real-time chat
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0

  # Storage
  shared_preferences: ^2.3.0

  # Location
  geolocator: ^13.0.2

  # Image
  image_picker: ^1.1.0
  cached_network_image: ^3.4.0
  flutter_dotenv: ^6.0.0

  # Launch tel: URIs for the (unmasked) direct-dial that becomes
  # available once the barber is ON_THE_WAY.
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/launcher_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/launcher_icon.png"
