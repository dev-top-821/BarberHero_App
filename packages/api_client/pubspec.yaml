name: api_client
description: Shared API client for BarberHero apps
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.9.0

dependencies:
  dio: ^5.7.0
  shared_preferences: ^2.3.0
  shared_models:
    path: ../shared_models

  # Real-time chat: Firestore for live message + room snapshots, Firebase Auth
  # for client identity (custom token minted by /users/me/firebase-token).
  firebase_core: ^3.12.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
